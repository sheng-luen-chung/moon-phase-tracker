<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>月相・星座・節氣報告</title>
<style>
  body { font-family:'Noto Sans TC',Arial,sans-serif;background:#111820;color:#f3f3f3;margin:0;padding:0 }
  .container { max-width:560px;margin:32px auto;background:#1b2336;padding:28px;border-radius:16px }
  h1 { text-align:center;color:#fff }
  h2 { color:#dce9d3;font-size:1.2rem;margin:28px 0 12px }
  .moon-emoji { font-size:2.5em;text-align:center;margin:8px 0 }
  .moon-figure { text-align:center }
  .moon-svg { max-width:150px;width:38vw;height:auto }
  .info { line-height:1.8;color:#ddd }
  .astro { color:#ffd700;font-weight:bold }
  .jieqi { color:#7fffd4;font-weight:bold }
  .diagram-section { margin-top:18px }
  .position-svg { display:block;width:100%;height:auto }
  .diagram-title { fill:#f3d36b;font-size:16px;font-weight:700 }
  .diagram-label { fill:#dce9d3;font-size:14px;font-weight:700 }
  .diagram-note { fill:#b8cbb2;font-size:13px;font-weight:600 }
  .sun-ray { stroke:#f3d36b;stroke-width:3;opacity:.75 }
  @media (max-width: 560px) {
    .container { margin:0;min-height:100vh;border-radius:0;padding:22px }
    h1 { font-size:1.7rem }
    .moon-emoji { font-size:2rem }
  }
</style>
</head>
<body>
<div class="container">
  <h1>🌙 月相＆星座＆節氣</h1>
  <div class="moon-emoji">🌖 虧凸月</div>
  <div class="moon-figure">
<svg class="moon-svg" width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="虧凸月，照亮度 55.3%">
  <defs>
    <radialGradient id="moon-lit" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#f3f0d2" />
      <stop offset="60%" stop-color="#d8dec6" />
      <stop offset="100%" stop-color="#aebca7" />
    </radialGradient>
    <clipPath id="moon-disc">
      <circle cx="60" cy="60" r="50" />
    </clipPath>
  </defs>
  <g clip-path="url(#moon-disc)">
    <circle cx="60" cy="60" r="50" fill="url(#moon-lit)" /><path d="M 60 10 A 50 50 0 0 1 60 110 A 5.25 50 0 0 0 60 10 Z" fill="#111820" />
    <circle cx="38" cy="45" r="5" fill="#7a866e" opacity="0.35" />
    <circle cx="68" cy="37" r="3" fill="#7a866e" opacity="0.28" />
    <circle cx="78" cy="66" r="4" fill="#7a866e" opacity="0.32" />
    <circle cx="47" cy="76" r="3" fill="#7a866e" opacity="0.25" />
  </g>
  <circle cx="60" cy="60" r="50" fill="none" stroke="#0a0f16" stroke-width="4" />
</svg>
</div>
  <div class="info">
    <div><b>時間：</b>2026-06-08 06:11:08</div>
    <div><b>陰曆：</b>2026年4月23日</div>
    <div><b>星座：</b><span class="astro">♊️ 雙子座</span>（黃經 76.8°）</div>
    <div><b>當前節氣：</b><span class="jieqi">🌾 芒種</span>（黃經 76.8°）</div>
    <div><b>月相：</b>55.3%</div>
    <div><b>仰角：</b>56.8° ⬆️</div>
    <div><b>方位：</b>195.2° ⬇️ 南</div>
  </div>
  
<section class="diagram-section" aria-label="太陽、地球與月亮相對位置">
  <h2>相對位置示意</h2>
  <svg class="position-svg" viewBox="0 0 420 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="太陽、地球與月亮的相對位置，月相為虧凸月">
    <defs>
      <radialGradient id="sun-glow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#fff6a6" />
        <stop offset="58%" stop-color="#f6b73c" />
        <stop offset="100%" stop-color="#d66b24" />
      </radialGradient>
      <radialGradient id="earth-glow" cx="35%" cy="30%" r="70%">
        <stop offset="0%" stop-color="#9be7ff" />
        <stop offset="62%" stop-color="#317cc8" />
        <stop offset="100%" stop-color="#163b75" />
      </radialGradient>
      <marker id="arrow-head" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
        <path d="M 0 0 L 8 4 L 0 8 Z" fill="#f3d36b" />
      </marker>
    </defs>

    <rect x="0" y="0" width="420" height="300" rx="18" fill="#111827" />
    <circle cx="210" cy="150" r="92" fill="none" stroke="#526072" stroke-width="2" stroke-dasharray="5 8" />

    <circle cx="46" cy="150" r="28" fill="url(#sun-glow)" />
    <text x="46" y="202" text-anchor="middle" class="diagram-label">太陽</text>
    <line x1="82" y1="112" x2="330" y2="112" class="sun-ray" marker-end="url(#arrow-head)" />
    <line x1="82" y1="150" x2="330" y2="150" class="sun-ray" marker-end="url(#arrow-head)" />
    <line x1="82" y1="188" x2="330" y2="188" class="sun-ray" marker-end="url(#arrow-head)" />

    <circle cx="210" cy="150" r="30" fill="url(#earth-glow)" stroke="#d7f0ff" stroke-width="2" />
    <path d="M 190 146 C 206 130, 222 140, 230 126" fill="none" stroke="#79c267" stroke-width="5" stroke-linecap="round" />
    <path d="M 194 164 C 208 154, 220 166, 232 158" fill="none" stroke="#79c267" stroke-width="5" stroke-linecap="round" />
    <text x="210" y="204" text-anchor="middle" class="diagram-label">地球</text>
    <circle cx="210" cy="120" r="5" fill="#ffffff" />
    <text x="222" y="115" class="diagram-note">北半球</text>

    <line x1="210" y1="150" x2="219.4" y2="241.5" stroke="#8ea0b8" stroke-width="2" stroke-dasharray="4 6" />
    <g>
      <circle cx="219.4" cy="241.5" r="24" fill="#d8dec6" stroke="#0a0f16" stroke-width="3" />
      <path d="M 219.41442788554727 219.5170396570378 A 22 22 0 0 1 219.41442788554727 263.5170396570378 A 2.31 22 0 0 0 219.41442788554727 219.5170396570378 Z" fill="#111820" opacity="0.9" />
      <circle cx="212.4" cy="235.5" r="3" fill="#7a866e" opacity="0.45" />
      <circle cx="227.4" cy="245.5" r="2.5" fill="#7a866e" opacity="0.35" />
    </g>
    <text x="219.4" y="283.5" text-anchor="middle" class="diagram-label">月亮</text>

    <text x="24" y="36" class="diagram-title">太陽光由左往右照</text>
    <text x="24" y="264" class="diagram-note">日月黃經差：264.1°</text>
    <text x="214" y="264" class="diagram-note">北半球視角：亮面朝左</text>
  </svg>
</section>

</div>
</body>
</html>
